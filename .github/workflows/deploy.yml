name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy-instance.yml
    with:
      vps_host: 76.13.112.138
      vps_user: paiva
      app_dir: /home/paiva/rede-guti
      remote_dist_path: /var/www/rede/dist/
      # Sem VITE_BRAND_*/VITE_GEO_*: os defaults do código reproduzem o
      # branding e a geografia originais (Rede SP / Guti 2026).
      frontend_env: |
        VITE_API_URL=/api
    secrets:
      ssh_key: ${{ secrets.VPS_SSH_KEY }}
