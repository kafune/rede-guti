name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      VPS_HOST: 76.13.112.138
      VPS_PORT: 22
      VPS_USER: paiva
      VPS_APP_DIR: /home/paiva/rede-guti

    steps:
      - name: Run redeploy script on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          debug: true
          request_pty: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            export PATH="$HOME/.bun/bin:$PATH"
            cd "${{ env.VPS_APP_DIR }}"
            chmod +x ./redeploy.sh
            ./redeploy.sh
